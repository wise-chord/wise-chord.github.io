<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%239986E0'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'/></svg>">
  <title data-i18n="appTitle">Chord's Blog</title>
</head>
<body>

  <!-- Top App Bar -->
  <header class="app-bar" id="appBar">
    <button class="icon-btn" id="menuBtn" aria-label="Open menu">
      <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
    </button>
    <span class="app-title" data-i18n="appTitle">Chord's Blog</span>
    <div class="app-spacer"></div>
    <div class="lang-wrapper">
      <div class="lang-select" id="langSelect" tabindex="0" role="combobox" aria-label="Language">
        <div class="lang-select__trigger">
          <span class="lang-select__text">en_GB</span>
          <svg class="lang-select__arrow" viewBox="0 0 24 24" width="12" height="12">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>
        <ul class="lang-select__dropdown">
          <li class="lang-select__option" data-value="en_GB">en_GB</li>
          <li class="lang-select__option" data-value="zh_CN">zh_CN</li>
          <li class="lang-select__option" data-value="zh_TW">zh_TW</li>
          <li class="lang-select__option" data-value="ja_JP">ja_JP</li>
        </ul>
      </div>
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" id="themeIcon"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
  </header>

  <!-- Navigation Drawer -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <svg class="drawer-avatar" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg"><rect  x="0" y="0" width="1080" height="1080" fill="white"/></svg>
      <div class="drawer-info">
        <span class="drawer-name">wise-chord</span>
        <span class="drawer-email">wisechord@gmail.com</span>
      </div>
    </div>
    <nav class="drawer-nav">
      <a class="drawer-item active" data-page="home" href="/">
        <svg viewBox="0 0 24 24" class="drawer-icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span data-i18n="home">Home</span>
      </a>
      <a class="drawer-item" data-page="about" href="/#about">
        <svg viewBox="0 0 24 24" class="drawer-icon"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span data-i18n="about">About</span>
      </a>
      <a class="drawer-item" data-page="blog" href="/#blog">
        <svg viewBox="0 0 24 24" class="drawer-icon"><path d="M3 13h8V3H3zm0 8h8v-6H3zm10 0h8V11h-8zm0-18v6h8V3z"/></svg>
        <span data-i18n="blog">Blog</span>
      </a>
      <a class="drawer-item" data-page="contact" href="/#contact">
        <svg viewBox="0 0 24 24" class="drawer-icon"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <span data-i18n="contact">Contact</span>
      </a>
    </nav>
  </aside>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Main Content -->
  <main class="content">
    <div class="post-body">
      {{ content }}
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav">
    <a class="bottom-nav-item active" data-page="home" href="/">
      <svg viewBox="0 0 24 24" class="bottom-nav-icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="bottom-nav-label" data-i18n="home">Home</span>
    </a>
    <a class="bottom-nav-item" data-page="about" href="/#about">
      <svg viewBox="0 0 24 24" class="bottom-nav-icon"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span class="bottom-nav-label" data-i18n="about">About</span>
    </a>
    <a class="bottom-nav-item" data-page="blog" href="/#blog">
      <svg viewBox="0 0 24 24" class="bottom-nav-icon"><path d="M3 13h8V3H3zm0 8h8v-6H3zm10 0h8V11h-8zm0-18v6h8V3z"/></svg>
      <span class="bottom-nav-label" data-i18n="blog">Blog</span>
    </a>
    <a class="bottom-nav-item" data-page="contact" href="/#contact">
      <svg viewBox="0 0 24 24" class="bottom-nav-icon"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      <span class="bottom-nav-label" data-i18n="contact">Contact</span>
    </a>
  </nav>

  <script src="/js/i18n/i18next.min.js"></script>
  <script src="/js/i18n/i18nextXHRBackend.min.js"></script>
  <script src="/js/modules/language.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
